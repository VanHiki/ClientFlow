spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/clientflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh}
    username: root
    password: root
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
  jackson:
    time-zone: Asia/Ho_Chi_Minh

server:
  port: ${SERVER_PORT:8080}

clientflow:
  booking:
    timezone: Asia/Ho_Chi_Minh
    slot-step-minutes: 30
    cancellation-notice-hours: ${BOOKING_CANCELLATION_NOTICE_HOURS:2}
  jwt:
    secret: ${JWT_SECRET:clientflow-dev-secret-change-me-32bytes}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
